# 무인점포 이상행동 감지 시스템 설정 파일

# 모델 설정
model:
  # LSTM 분류 모델 경로
  classifier_path: "mymodule/yolo11s_model.pth"
  # YOLO11s-pose 모델 경로
  pose_model_path: "mymodule/yolo11s-pose.pt"
  # 시퀀스 최소 길이 (프레임 수)
  min_sequence_length: 20
  # 키포인트 개수 (YOLO pose 17개 관절 × 2 좌표)
  keypoint_count: 34

# 감지 임계값 설정
thresholds:
  # 클래스별 신뢰도 임계값
  fall: 0.75
  damage: 0.75
  fire: 0.90
  smoke: 0.90
  abandon: 0.75
  theft: 0.70
  assault: 0.75
  # Normal 클래스와의 최소 신뢰도 차이
  confidence_margin: 0.15
  # 일반 감지 최소 신뢰도
  min_confidence: 0.70
  # 녹화 보존 최소 신뢰도
  min_recording_confidence: 0.65

# 버퍼 설정
buffer:
  # 프레임 버퍼 크기 (프레임 수, 30fps 기준 2초)
  frame_buffer_size: 60
  # 키포인트 버퍼 크기 (프레임 수, 30fps 기준 4초)
  keypoints_buffer_size: 120

# 감지 설정
detection:
  # 프레임 샘플링 간격 (N프레임마다 1번 체크)
  sampling_interval: 10
  # 모니터링 주기 (초)
  monitoring_period: 3
  # 모니터링 주기 내 최소 감지 횟수
  min_detections: 2
  # 연속 감지 쿨다운 (초)
  cooldown: 45

# 녹화 설정
recording:
  # 녹화 길이 (초)
  duration: 40
  # 녹화 전 버퍼 시간 (초)
  pre_buffer: 2
  # 녹화 후 버퍼 시간 (초)
  post_buffer: 0
  # 최소 감지 횟수 (이하 시 삭제)
  min_detection_count: 2
  # 최대 감지 간격 (초, 초과 시 삭제)
  max_detection_gap: 15.0
  # FPS
  fps: 30

# 가중치 설정
weights:
  # 대표 행동 선정 시 가중치
  detection_count: 0.7
  max_confidence: 0.3

# 입력 검증
validation:
  # 키포인트 범위 검증 허용 오차 (정규화 후 0~1 범위)
  keypoint_range_tolerance: 0.1
  # NaN/Inf 체크 활성화
  check_invalid_values: true

# 로깅 설정
logging:
  # 로깅 레벨 (DEBUG, INFO, WARNING, ERROR)
  level: "INFO"
  # 경고 메시지 출력 제한 (처음 N번)
  warning_limit: 5
  # 경고 메시지 주기 출력 (N번마다)
  warning_interval: 100

# S3 설정
s3:
  bucket: "cctv-recordings-yuhan-20250505"
  region: "ap-northeast-2"

# API 설정
api:
  # API 서버 URL
  url: "http://13.124.42.203:8080/api/anomaly/notify"
  # 타임아웃 (초)
  timeout: 30
